name: Deploy Portal

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install
        run: npm ci
        working-directory: portal

      - name: Build
        run: npm run build
        working-directory: portal
        env:
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_MESSAGING_SENDER_ID: ${{ secrets.VITE_FB_MESSAGING_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_GMAPS_API_KEY: ${{ secrets.VITE_GMAPS_API_KEY }}

      - name: Copy build into member/
        run: |
          rm -rf member
          cp -r portal/dist/. member

      - name: Publish /login entry (reuses the portal bundle)
        run: |
          rm -rf login
          mkdir -p login
          cp member/index.html login/index.html

      - name: Commit member/ + login/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add member/ login/
          git diff --staged --quiet || git commit -m "chore: deploy portal to /member + /login [skip ci]"
          git push
